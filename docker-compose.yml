version: '3.8'

services:
  # --- MISSION CONTROL ENGINE (BACKEND) ---
  backend:
    build: .
    container_name: hyprlead-backend
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3005
      - NODE_ENV=production
    ports:
      - "3005:3005"

  # --- MISSION CONTROL DASHBOARD (FRONTEND) ---
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: hyprlead-frontend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

networks:
  default:
    name: hyprlead-network